services:
  redis-broker:
    image: redis:7-alpine
    container_name: receipt-redis-broker
    ports:
      - "6379:6379"
    restart: always

  minio-storage:
    image: minio/minio
    container_name: receipt-object-storage
    ports:
      - "9000:9000"   
      - "9001:9001"  
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    command: server /data --console-address ":9001"
    restart: always